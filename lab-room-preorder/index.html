<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lab Room Pre-Order - Login</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#2563EB',
                        text: '#0F172A',
                        secondaryText: '#64748B',
                        border: '#E2E8F0',
                    },
                    borderRadius: {
                        'xl': '16px',
                    },
                    scale: {
                        '102': '1.02',
                    }
                }
            }
        }
    </script>
    <!-- React and ReactDOM -->
    <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
    <!-- Babel for JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background: linear-gradient(135deg, #F8FAFC 0%, #EFF6FF 100%);
            min-height: 100vh;
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
        }
    </style>
</head>
<body>
    <div id="root" class="w-full h-full flex items-center justify-center"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const EyeIcon = ({ className }) => (
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M2 12s3-7 10-7 10 7 10 7-3 7-10 7-10-7-10-7Z"/><circle cx="12" cy="12" r="3"/></svg>
        );

        const EyeOffIcon = ({ className }) => (
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M9.88 9.88a3 3 0 1 0 4.24 4.24"/><path d="M10.73 5.08A10.43 10.43 0 0 1 12 5c7 0 10 7 10 7a13.16 13.16 0 0 1-1.67 2.68"/><path d="M6.61 6.61A13.526 13.526 0 0 0 2 12s3 7 10 7a9.74 9.74 0 0 0 5.39-1.61"/><line x1="2" x2="22" y1="2" y2="22"/></svg>
        );

        const FlaskIcon = ({ className }) => (
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M10 2v7.31"/><path d="M14 9.3V1.99"/><path d="M8.5 2h7"/><path d="M14 9.3a6.5 6.5 0 1 1-4 0"/><line x1="5.52" x2="18.48" y1="16" y2="16"/></svg>
        );

        const LoaderIcon = ({ className }) => (
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M21 12a9 9 0 1 1-6.219-8.56"/></svg>
        );

        function App() {
            const [studentId, setStudentId] = useState('');
            const [password, setPassword] = useState('');
            const [showPassword, setShowPassword] = useState(false);
            const [rememberMe, setRememberMe] = useState(false);
            
            const [isLoading, setIsLoading] = useState(false);
            const [error, setError] = useState('');

            const handleLogin = (e) => {
                e.preventDefault();
                setError('');

                if (!studentId.trim()) {
                    setError('Please enter your Student ID.');
                    return;
                }
                if (!password) {
                    setError('Please enter your password.');
                    return;
                }

                setIsLoading(true);
                setTimeout(() => {
                    setIsLoading(false);
                    if (studentId === 'admin' && password === 'admin') {
                        alert('Login successful! (Mock)');
                    } else {
                        setError('Invalid Student ID or password. Please try again.');
                    }
                }, 1500);
            };

            return (
                <div className="w-full max-w-[1000px] p-6 flex justify-center items-center mx-auto">
                    <div className="bg-white w-full max-w-4xl rounded-xl shadow-[0_8px_30px_rgb(0,0,0,0.04)] flex overflow-hidden border border-border">
                        
                        {/* Left Side - Login Form */}
                        <div className="w-full md:w-1/2 p-8 sm:p-12">
                            <div className="flex items-center gap-2 mb-8">
                                <div className="w-10 h-10 bg-blue-100 rounded-lg flex items-center justify-center text-primary">
                                    <FlaskIcon />
                                </div>
                                <span className="font-semibold text-lg text-text">LabRoom</span>
                            </div>

                            <div className="mb-8">
                                <h1 className="text-2xl sm:text-3xl font-bold text-text mb-2">Welcome back</h1>
                                <p className="text-secondaryText text-sm sm:text-base">Enter your details to access the pre-order system.</p>
                            </div>

                            <form onSubmit={handleLogin} className="space-y-5">
                                {error && (
                                    <div className="p-3 text-sm text-red-600 bg-red-50 border border-red-100 rounded-lg transition-all duration-200">
                                        {error}
                                    </div>
                                )}

                                <div className="space-y-1.5">
                                    <label htmlFor="studentId" className="block text-sm font-medium text-text">
                                        Student ID
                                    </label>
                                    <input
                                        id="studentId"
                                        type="text"
                                        value={studentId}
                                        onChange={(e) => setStudentId(e.target.value)}
                                        className="w-full px-4 py-2.5 rounded-lg border border-border text-text placeholder-slate-400 focus:outline-none focus:ring-2 focus:ring-primary/50 focus:border-primary transition-all duration-200"
                                        placeholder="e.g. 64010000"
                                        disabled={isLoading}
                                    />
                                </div>

                                <div className="space-y-1.5">
                                    <label htmlFor="password" className="block text-sm font-medium text-text">
                                        Password
                                    </label>
                                    <div className="relative">
                                        <input
                                            id="password"
                                            type={showPassword ? "text" : "password"}
                                            value={password}
                                            onChange={(e) => setPassword(e.target.value)}
                                            className="w-full px-4 py-2.5 rounded-lg border border-border text-text placeholder-slate-400 focus:outline-none focus:ring-2 focus:ring-primary/50 focus:border-primary transition-all duration-200"
                                            placeholder="••••••••"
                                            disabled={isLoading}
                                        />
                                        <button
                                            type="button"
                                            onClick={() => setShowPassword(!showPassword)}
                                            className="absolute right-3 top-1/2 -translate-y-1/2 text-slate-400 hover:text-slate-600 transition-colors focus:outline-none focus:ring-2 focus:ring-primary/50 rounded"
                                            disabled={isLoading}
                                            aria-label={showPassword ? "Hide password" : "Show password"}
                                        >
                                            {showPassword ? <EyeOffIcon /> : <EyeIcon />}
                                        </button>
                                    </div>
                                </div>

                                <div className="flex items-center justify-between pt-1">
                                    <div className="flex items-center">
                                        <input
                                            id="rememberMe"
                                            type="checkbox"
                                            checked={rememberMe}
                                            onChange={(e) => setRememberMe(e.target.checked)}
                                            className="h-4 w-4 rounded border-border text-primary focus:ring-primary/50 focus:ring-2 cursor-pointer"
                                            disabled={isLoading}
                                        />
                                        <label htmlFor="rememberMe" className="ml-2 block text-sm text-secondaryText cursor-pointer">
                                            Remember me
                                        </label>
                                    </div>
                                    <a href="#" className="text-sm font-medium text-primary hover:text-blue-700 transition-colors focus:outline-none focus:underline">
                                        Forgot password?
                                    </a>
                                </div>

                                <button
                                    type="submit"
                                    disabled={isLoading}
                                    className="w-full flex items-center justify-center py-2.5 px-4 mt-2 bg-primary text-white font-medium rounded-lg hover:bg-blue-700 focus:outline-none focus:ring-2 focus:ring-primary focus:ring-offset-2 transition-all duration-200 hover:scale-[1.02] active:scale-100 disabled:opacity-70 disabled:hover:scale-100 disabled:cursor-not-allowed"
                                >
                                    {isLoading ? (
                                        <LoaderIcon className="animate-spin mr-2" />
                                    ) : null}
                                    {isLoading ? 'Signing in...' : 'Sign in'}
                                </button>
                            </form>
                            
                            <div className="mt-8 text-center text-sm text-secondaryText">
                                Don't have an account? <a href="#" className="font-medium text-primary hover:text-blue-700 transition-colors">Request access</a>
                            </div>
                        </div>

                        {/* Right Side - Decorative/Illustration */}
                        <div className="hidden md:flex w-1/2 bg-slate-50 border-l border-border flex-col justify-center items-center p-12 relative overflow-hidden">
                            {/* Abstract background shapes */}
                            <div className="absolute top-0 right-0 -mt-20 -mr-20 w-80 h-80 bg-blue-100 rounded-full mix-blend-multiply filter blur-3xl opacity-70"></div>
                            <div className="absolute bottom-0 left-0 -mb-20 -ml-20 w-80 h-80 bg-indigo-100 rounded-full mix-blend-multiply filter blur-3xl opacity-70"></div>
                            
                            <div className="relative z-10 w-full max-w-sm">
                                <div className="bg-white p-6 rounded-xl shadow-sm border border-border mb-6 transform -rotate-3 hover:rotate-0 transition-transform duration-500">
                                    <div className="flex gap-3 items-center mb-4 border-b border-slate-100 pb-4">
                                        <div className="w-3 h-3 rounded-full bg-red-400"></div>
                                        <div className="w-3 h-3 rounded-full bg-yellow-400"></div>
                                        <div className="w-3 h-3 rounded-full bg-green-400"></div>
                                        <div className="text-xs font-mono text-slate-400 ml-2">lab-booking.app</div>
                                    </div>
                                    <div className="space-y-3">
                                        <div className="h-4 bg-slate-100 rounded w-3/4"></div>
                                        <div className="h-4 bg-slate-100 rounded w-1/2"></div>
                                        <div className="h-10 bg-blue-50 rounded mt-4 flex items-center px-3">
                                            <div className="w-4 h-4 bg-blue-200 rounded-sm mr-2"></div>
                                            <div className="h-3 bg-blue-100 rounded w-1/3"></div>
                                        </div>
                                    </div>
                                </div>
                                <div className="text-center">
                                    <h3 className="text-lg font-semibold text-text mb-2">Secure your lab space</h3>
                                    <p className="text-secondaryText text-sm">
                                        Book lab rooms, equipment, and manage your research schedule in one place.
                                    </p>
                                </div>
                            </div>
                        </div>

                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
